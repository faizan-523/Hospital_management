{% extends 'base.html' %}
{% block title %}Add Patient{% endblock %}
{% block page_title %}Add New Patient{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-7">
    <div class="card">
      <div class="card-header"><i class="bi bi-person-plus me-2"></i>Patient Information</div>
      <div class="card-body p-4">
        <form method="POST">
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">Full Name *</label>
              <input type="text" name="name" class="form-control" placeholder="Ahmed Raza" required>
            </div>
            <div class="col-md-3">
              <label class="form-label">Age *</label>
              <input type="number" name="age" class="form-control" placeholder="25" required>
            </div>
            <div class="col-md-3">
              <label class="form-label">Gender *</label>
              <select name="gender" class="form-select" required>
                <option value="">Select</option>
                <option>Male</option>
                <option>Female</option>
                <option>Other</option>
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label">Phone</label>
              <input type="text" name="phone" class="form-control" placeholder="0300-1234567">
            </div>
            <div class="col-md-3">
              <label class="form-label">Blood Type</label>
              <select name="blood" class="form-select">
                <option value="">—</option>
                <option>A+</option><option>A-</option>
                <option>B+</option><option>B-</option>
                <option>O+</option><option>O-</option>
                <option>AB+</option><option>AB-</option>
              </select>
            </div>
            <div class="col-md-3">
              <label class="form-label">Disease *</label>
              <input type="text" name="disease" class="form-control" placeholder="Hypertension" required>
            </div>
          </div>
          <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn btn-teal px-4">
              <i class="bi bi-check-lg me-1"></i>Save Patient
            </button>
            <a href="/patients" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
