{% extends 'base.html' %}
{% block title %}Edit Patient{% endblock %}
{% block page_title %}Edit Patient{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-7">
    <div class="card">
      <div class="card-header"><i class="bi bi-pencil me-2"></i>Edit Patient — {{ patient.name }}</div>
      <div class="card-body p-4">
        <form method="POST">
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">Full Name *</label>
              <input type="text" name="name" class="form-control" value="{{ patient.name }}" required>
            </div>
            <div class="col-md-3">
              <label class="form-label">Age *</label>
              <input type="number" name="age" class="form-control" value="{{ patient.age }}" required>
            </div>
            <div class="col-md-3">
              <label class="form-label">Gender *</label>
              <select name="gender" class="form-select" required>
                <option value="">Select</option>
                {% for g in ['Male','Female','Other'] %}
                  <option {% if patient.gender==g %}selected{% endif %}>{{ g }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label">Phone</label>
              <input type="text" name="phone" class="form-control" value="{{ patient.get('phone','') }}">
            </div>
            <div class="col-md-3">
              <label class="form-label">Blood Type</label>
              <select name="blood" class="form-select">
                <option value="">—</option>
                {% for b in ['A+','A-','B+','B-','O+','O-','AB+','AB-'] %}
                  <option {% if patient.get('blood')==b %}selected{% endif %}>{{ b }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="col-md-3">
              <label class="form-label">Disease *</label>
              <input type="text" name="disease" class="form-control" value="{{ patient.disease }}" required>
            </div>
          </div>
          <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn btn-teal px-4">
              <i class="bi bi-check-lg me-1"></i>Update Patient
            </button>
            <a href="/patients" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
