{% extends 'base.html' %}
{% block title %}Add Doctor{% endblock %}
{% block page_title %}Add Doctor{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card">
      <div class="card-header"><i class="bi bi-person-badge me-2"></i>Doctor Information</div>
      <div class="card-body p-4">
        <form method="POST">
          <div class="row g-3">
            <div class="col-12">
              <label class="form-label">Full Name *</label>
              <input type="text" name="name" class="form-control" placeholder="Fatima Malik" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Specialization *</label>
              <select name="specialization" class="form-select" required>
                <option value="">Select</option>
                {% for s in ['Cardiology','Neurology','Orthopedics','Maternity','General','Dermatology','Pediatrics','ENT','Ophthalmology','Psychiatry'] %}
                  <option>{{ s }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label">Phone *</label>
              <input type="text" name="phone" class="form-control" placeholder="0321-1234567" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Consultation Fees (Rs.)</label>
              <input type="number" name="fees" class="form-control" placeholder="1500">
            </div>
            <div class="col-md-6">
              <label class="form-label">Schedule</label>
              <input type="text" name="schedule" class="form-control" placeholder="Mon-Fri 9am-5pm">
            </div>
          </div>
          <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn btn-teal px-4">
              <i class="bi bi-check-lg me-1"></i>Save Doctor
            </button>
            <a href="/doctors" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
