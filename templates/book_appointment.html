{% extends 'base.html' %}
{% block title %}Book Appointment{% endblock %}
{% block page_title %}Book Appointment{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card">
      <div class="card-header"><i class="bi bi-calendar-plus me-2"></i>Appointment Details</div>
      <div class="card-body p-4">
        <form method="POST">
          <div class="row g-3">
            <div class="col-12">
              <label class="form-label">Patient Name *</label>
              <select name="patient_name" class="form-select" required>
                <option value="">Select Patient</option>
                {% for p in patients %}
                  <option>{{ p.name }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="col-12">
              <label class="form-label">Doctor *</label>
              <select name="doctor_name" class="form-select" required>
                <option value="">Select Doctor</option>
                {% for d in doctors %}
                  <option>{{ d.name }} — {{ d.specialization }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label">Date *</label>
              <input type="date" name="date" class="form-control" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Time *</label>
              <input type="time" name="time" class="form-control" required>
            </div>
          </div>
          <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn btn-teal px-4">
              <i class="bi bi-check-lg me-1"></i>Book Appointment
            </button>
            <a href="/appointments" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
